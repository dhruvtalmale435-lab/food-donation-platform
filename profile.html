<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile - Food Donation Platform</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .profile-page { padding: 40px; max-width: 900px; margin: auto; }
    .profile-card { background: white; border-radius: 24px; padding: 36px; box-shadow: 0 10px 30px rgba(0,0,0,0.10); border: 1px solid #e5e7eb; }
    .profile-avatar-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; position: relative; }
    .profile-avatar-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #22c55e; box-shadow: 0 8px 24px rgba(34,197,94,0.25); }
    .avatar-placeholder { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg,#166534,#22c55e); display: flex; align-items: center; justify-content: center; font-size: 48px; color: white; font-weight: 800; border: 4px solid #22c55e; box-shadow: 0 8px 24px rgba(34,197,94,0.25); }
    .avatar-edit-btn { position: absolute; bottom: 36px; right: calc(50% - 70px); background: #2563eb; color: white; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(37,99,235,0.4); transition: 0.2s; }
    .avatar-edit-btn:hover { transform: scale(1.1); background: #1d4ed8; }
    .avatar-name { margin-top: 12px; font-size: 20px; font-weight: 800; color: #0f172a; }
    .avatar-role-badge { margin-top: 6px; padding: 4px 14px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .role-donor { background: #dcfce7; color: #166534; }
    .role-ngo { background: #dbeafe; color: #1d4ed8; }
    .role-admin { background: #f5f3ff; color: #5b21b6; }
    .role-community { background: #fef3c7; color: #92400e; }
    #avatarInput { display: none; }
    .profile-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .info-box { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 14px; padding: 18px; }
    .info-box label { font-size: 13px; color: #64748b; font-weight: 600; display: block; margin-bottom: 6px; }
    .info-box input { width: 100%; border: none; background: transparent; font-size: 16px; color: #0f172a; font-weight: 600; outline: none; }
    .info-box input:disabled { color: #94a3b8; }
    .info-box.readonly { background: #f1f5f9; }
    .profile-msg { text-align: center; margin-top: 16px; font-weight: 600; min-height: 22px; }
    .save-btn { width: 100%; margin-top: 24px; font-size: 16px; }
    .account-details { margin-top: 30px; padding-top: 24px; border-top: 1px solid #e5e7eb; }
    .account-details h3 { color: #14532d; margin-bottom: 16px; }
    .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9; font-size: 15px; }
    .detail-row span:first-child { color: #64748b; font-weight: 600; }
    .detail-row span:last-child { color: #0f172a; font-weight: 700; }
    @media(max-width:700px){ .profile-info-grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>

  <header>
    <nav class="navbar">
      <h1>Food Donation Platform</h1>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li id="navDonorDashboard"><a href="donor-dashboard.html">Donor Dashboard</a></li>
        <li id="navNgoDashboard"><a href="ngo-dashboard.html">NGO Dashboard</a></li>
        <li id="navAdminDashboard"><a href="admin-dashboard.html">Admin Dashboard</a></li>
        <li><a href="profile.html" class="active">My Profile</a></li>
        <li id="navLogin"><a href="login.html">Login</a></li>
        <li id="navLogout"><a href="#" onclick="logoutUser()">Logout</a></li>
      </ul>
    </nav>
  </header>

  <div class="profile-page">
    <div class="profile-card">

      <div class="profile-avatar-wrap">
        <div id="avatarDisplay"></div>
        <button class="avatar-edit-btn" onclick="document.getElementById('avatarInput').click()" title="Change photo">✏️</button>
        <p class="avatar-name" id="avatarName">-</p>
        <span class="avatar-role-badge" id="avatarRoleBadge">-</span>
        <input type="file" id="avatarInput" accept="image/*" onchange="uploadAvatar(this)" />
      </div>

      <div class="profile-info-grid">
        <div class="info-box">
          <label>Full Name</label>
          <input type="text" id="editName" placeholder="Enter your name" />
        </div>
        <div class="info-box">
          <label>Phone Number</label>
          <input type="tel" id="editPhone" placeholder="Enter phone number" maxlength="10" />
        </div>
        <div class="info-box readonly">
          <label>Email Address</label>
          <input type="email" id="editEmail" disabled />
        </div>
        <div class="info-box readonly">
          <label>Role</label>
          <input type="text" id="editRole" disabled />
        </div>
      </div>

      <button class="btn save-btn" onclick="saveProfile()">💾 Save Changes</button>
      <p class="profile-msg" id="profileMsg"></p>

      <div class="account-details">
        <h3>Account Details</h3>
        <div class="detail-row">
          <span>User ID</span>
          <span id="detailUserId">-</span>
        </div>
        <div class="detail-row">
          <span>Email</span>
          <span id="detailEmail">-</span>
        </div>
        <div class="detail-row">
          <span>Role</span>
          <span id="detailRole">-</span>
        </div>
        <div class="detail-row">
          <span>Member Since</span>
          <span id="detailJoined">-</span>
        </div>
        <div class="detail-row">
          <span>Total Donations</span>
          <span id="detailDonations">-</span>
        </div>
        <div class="detail-row">
          <span>Account Status</span>
          <span style="color:#22c55e;">✅ Active</span>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <p>&copy; 2026 Food Donation Platform | My Profile</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script>
    protectPage(["donor", "ngo", "admin"]);
    setupRoleNavbar();

    const userId = localStorage.getItem("userId");
    const userEmail = localStorage.getItem("userEmail");
    const userRole = localStorage.getItem("userRole");

    function renderAvatar(url, name) {
      const wrap = document.getElementById("avatarDisplay");
      const nameEl = document.getElementById("avatarName");
      const badgeEl = document.getElementById("avatarRoleBadge");
      const letter = (name || userEmail || "U")[0].toUpperCase();

      if (url) {
        wrap.innerHTML = `<img src="${url}" class="profile-avatar-img" />`;
      } else {
        wrap.innerHTML = `<div class="avatar-placeholder">${letter}</div>`;
      }

      if (nameEl) nameEl.textContent = name || userEmail?.split("@")[0] || "-";
      if (badgeEl) {
        const roleLabels = { donor:"🍱 Donor", ngo:"🏢 NGO", admin:"⚙️ Admin", community:"👥 Community" };
        badgeEl.textContent = roleLabels[userRole] || userRole || "-";
        badgeEl.className = "avatar-role-badge role-" + (userRole || "donor");
      }
    }

    async function loadProfile() {
      document.getElementById("editEmail").value = userEmail || "";
      document.getElementById("editRole").value = userRole ? userRole.charAt(0).toUpperCase() + userRole.slice(1) : "";
      document.getElementById("detailEmail").textContent = userEmail || "-";
      document.getElementById("detailRole").textContent = userRole || "-";
      document.getElementById("detailUserId").textContent = userId ? userId.slice(0, 8) + "..." : "-";

      const { data: profile } = await db.from("profiles").select("*").eq("id", userId).single();

      if (profile) {
        document.getElementById("editName").value = profile.name || "";
        document.getElementById("editPhone").value = profile.phone || "";
        document.getElementById("detailJoined").textContent = profile.created_at ? new Date(profile.created_at).toLocaleDateString("en-IN", { year:"numeric", month:"long", day:"numeric" }) : "-";
        renderAvatar(profile.avatar_url, profile.name);
        if (profile.name) localStorage.setItem("userName", profile.name);
      } else {
        renderAvatar(null, userEmail);
        document.getElementById("detailJoined").textContent = "N/A";
      }

      // Count donations
      const { count } = await db.from("donation").select("*", { count: "exact", head: true }).eq("user_id", userId);
      document.getElementById("detailDonations").textContent = count || 0;
    }

    async function saveProfile() {
      const name = document.getElementById("editName").value.trim();
      const phone = document.getElementById("editPhone").value.trim();
      const msg = document.getElementById("profileMsg");

      if (!name) { msg.style.color = "red"; msg.textContent = "❌ Name cannot be empty."; return; }
      if (phone && !/^\d{10}$/.test(phone)) { msg.style.color = "red"; msg.textContent = "❌ Enter a valid 10-digit phone number."; return; }

      const { error } = await db.from("profiles").upsert([{ id: userId, email: userEmail, name, phone, role: userRole }]);

      if (error) { msg.style.color = "red"; msg.textContent = "❌ " + error.message; return; }

      localStorage.setItem("userName", name);
      msg.style.color = "green";
      msg.textContent = "✅ Profile updated successfully!";
      setTimeout(() => { msg.textContent = ""; }, 3000);
    }

    async function uploadAvatar(input) {
      const file = input.files[0];
      if (!file) return;
      if (file.size > 2 * 1024 * 1024) { alert("Image must be under 2MB."); return; }

      const msg = document.getElementById("profileMsg");
      msg.style.color = "#888";
      msg.textContent = "Uploading...";

      const ext = file.name.split(".").pop();
      const path = `avatars/${userId}.${ext}`;

      const { error: uploadError } = await db.storage.from("avatars").upload(path, file, { upsert: true });

      if (uploadError) {
        msg.style.color = "red";
        msg.textContent = "❌ Upload failed: " + uploadError.message;
        return;
      }

      const { data: urlData } = db.storage.from("avatars").getPublicUrl(path);
      const avatar_url = urlData.publicUrl;

      await db.from("profiles").upsert([{ id: userId, email: userEmail, role: userRole, avatar_url }]);

      renderAvatar(avatar_url, document.getElementById("editName").value);
      msg.style.color = "green";
      msg.textContent = "✅ Profile picture updated!";
      setTimeout(() => { msg.textContent = ""; }, 3000);
    }

    loadProfile();
  </script>

</body>
</html>
