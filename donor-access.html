<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donor Access Required</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="donor-access-body">

  <div class="donor-access-wrapper">
    <div class="donor-access-card">

      <div class="guide-zone">
        <div class="guide-cap"></div>
        <div class="guide-head">
          <div class="eye left-eye"></div>
          <div class="eye right-eye"></div>
          <div class="smile"></div>
        </div>

        <div class="guide-body">
          <div class="guide-arm-left"></div>
          <div class="guide-arm-right"></div>
          <div class="guide-hand-point"></div>
        </div>

        <div class="guide-leg left-leg"></div>
        <div class="guide-leg right-leg"></div>
      </div>

      <div class="access-text-zone">
        <span class="access-tag">Donor Access Only</span>
        <h1>Hey! Login as Donor first 😄</h1>
        <p>
          To submit food donations, you need to login with a donor account.
          Our funny guide is already pointing you in the right direction 😄
        </p>

        <div class="access-buttons">
          <a href="login.html" class="btn">Login as Donor</a>
          <a href="index.html" class="btn btn-outline">Back to Home</a>
        </div>

        <div class="access-note-box">
          <strong>Note:</strong> NGOs and admins can explore the platform, but only donors can fill the donation form.
        </div>
      </div>

    </div>
  </div>

</body>
</html>
